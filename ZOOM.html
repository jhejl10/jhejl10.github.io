<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Phone - Call Center Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Using Inter font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Lighter gray background */
        }
        /* Presence Status indicators using Font Awesome */
        .status-icon { width: 1.25em; text-align: center; margin-right: 6px; }
        .status-available { color: #16a34a; } /* green-600 */
        .status-on-call { color: #dc2626; } /* red-600 */
        .status-busy { color: #f97316; } /* orange-500 */
        .status-away { color: #eab308; } /* yellow-500 */
        .status-dnd { color: #ef4444; } /* red-500 */
        .status-in-a-meeting { color: #2563eb; } /* blue-600 */
        .status-out-of-office { color: #a855f7; } /* purple-500 */
        .status-offline { color: #6b7280; } /* gray-500 */

        body { padding-top: 64px; }

        /* Responsive grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 2fr 1fr; } }
        @media (min-width: 1280px) { .dashboard-grid { grid-template-columns: 3fr 2fr 2fr; } }

        /* Draggable Panel Styles */
        .dashboard-panel { border-radius: 0.5rem; background-color: white; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1); cursor: grab; border: 2px solid transparent; transition: border-color 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease; }
        .dashboard-panel.dragging { cursor: grabbing; opacity: 0.7; border-color: #60a5fa; /* blue-400 */ box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .panel-drag-over { border: 2px dashed #60a5fa; /* blue-400 */ }

        /* Draggable Site Styles */
        .site-section { cursor: grab; border: 1px solid #e5e7eb; transition: border-color 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease; }
        .site-section:hover { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .site-section.dragging { cursor: grabbing; opacity: 0.6; border-color: #93c5fd; /* blue-300 */ box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05); }
        .site-drag-over { border-top: 2px dashed #93c5fd; /* blue-300 */ }

        /* Collapse/Expand Indicator */
        .toggle-icon { transition: transform 0.2s ease-in-out; color: #9ca3af; /* gray-400 */ }
        .site-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background-color: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .site-header:hover .toggle-icon { color: #3b82f6; }
        .site-header .toggle-icon.collapsed { transform: rotate(-90deg); }
        .user-list.hidden { display: none; }
        .user-list { padding: 0.75rem; }

        /* Clickable user item */
        .user-item { cursor: pointer; transition: background-color 0.15s ease-in-out; }
        .user-item:hover { background-color: #f0f9ff; /* sky-50 */ }

        /* Inline Expanded User Detail View */
        .user-detail-view { background-color: #f8fafc; /* cool-gray-50 */ border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; margin-left: -0.75rem; margin-right: -0.75rem; /* Span full width */ padding: 1rem 1.5rem; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .user-detail-view .detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 1rem; align-items: center; }
        .user-detail-view img { border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .detail-label { font-weight: 500; color: #4b5563; /* gray-600 */ text-align: right; }
        .detail-value { color: #1f2937; /* gray-800 */ }
        .status-message-bubble { background-color: #e0e7ff; /* indigo-100 */ color: #4338ca; /* indigo-700 */ border-radius: 0.75rem; padding: 0.25rem 0.75rem; display: inline-block; font-style: italic; }

        /* Summary Stats */
        .stat-card { background-color: white; padding: 1rem; border-radius: 0.375rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); text-align: center; }
        .stat-value { font-size: 1.875rem; font-semibold; color: #1f2937; }
        .stat-label { font-size: 0.875rem; color: #6b7280; margin-top: 0.25rem; }

        /* Search Input */
        .search-input { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4); outline: none; }

        /* Loading Overlay */
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255, 255, 255, 0.7); display: flex; justify-content: center; align-items: center; z-index: 10; }
        .loading-overlay.hidden { display: none; }

        /* Action Buttons */
        .action-button { padding: 0.3rem 0.8rem; font-size: 0.8rem; border-radius: 0.375rem; transition: background-color 0.2s ease; display: inline-flex; align-items: center; gap: 0.3rem; border: 1px solid transparent; }
        .action-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .call-button { background-color: #22c55e; color: white; border-color: #16a34a; }
        .call-button:hover:not(:disabled) { background-color: #15803d; }
        .chat-button { background-color: #3b82f6; color: white; border-color: #2563eb; }
        .chat-button:hover:not(:disabled) { background-color: #1d4ed8; }
        .text-button { background-color: #a855f7; color: white; border-color: #9333ea; }
        .text-button:hover:not(:disabled) { background-color: #7e22ce; }
        .add-contact-button { background-color: #f0f9ff; color: #0284c7; border-color: #bae6fd; }
        .add-contact-button:hover:not(:disabled) { background-color: #e0f2fe; }

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-md fixed top-0 left-0 right-0 z-30 h-16 flex items-center">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-800 flex items-center">
                <i class="fas fa-headset mr-2 text-blue-600"></i> Call Center Dashboard
            </h1>
            <div class="text-sm text-gray-600">
                Last Updated: <span id="last-updated">--:--:--</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 mt-4">

        <section id="summary-stats" class="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card"> <div class="stat-value" id="stat-total-users">0</div> <div class="stat-label">Total Users</div> </div>
            <div class="stat-card"> <div class="stat-value" id="stat-available-users">0</div> <div class="stat-label">Available Users</div> </div>
            <div class="stat-card"> <div class="stat-value" id="stat-on-call-users">0</div> <div class="stat-label">On Call</div> </div>
            <div class="stat-card"> <div class="stat-value" id="stat-active-calls">0</div> <div class="stat-label">Active Calls</div> </div>
        </section>

        <div id="dashboard-main-grid" class="dashboard-grid">

            <div id="panel-users" class="dashboard-panel" draggable="true">
                 <div class="p-4 border-b border-gray-200 cursor-grab"> <h2 class="text-lg font-semibold text-gray-700 mb-3">Presence Status by Site</h2>
                    <input type="text" id="user-search" placeholder="Search users by name or ext..."
                           class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm search-input">
                 </div>
                <div id="sites-container" class="space-y-1 p-4 pt-0 max-h-[65vh] overflow-y-auto relative">
                    <p class="text-gray-500 p-4 text-center">Loading user data...</p>
                     <div id="users-loading" class="loading-overlay hidden">
                         <i class="fas fa-spinner fa-spin text-blue-500 text-3xl"></i>
                     </div>
                </div>
            </div>

            <div id="panel-calls" class="dashboard-panel" draggable="true">
                <div class="p-4 border-b border-gray-200 cursor-grab">
                    <h2 class="text-lg font-semibold text-gray-700">Active Calls</h2>
                </div>
                <div id="active-calls-container" class="p-4 space-y-3 max-h-[70vh] overflow-y-auto">
                    <p class="text-gray-500 text-center py-4">Loading active calls...</p>
                </div>
            </div>

             <div id="panel-queues" class="dashboard-panel" draggable="true">
                <div class="p-4 border-b border-gray-200 cursor-grab">
                    <h2 class="text-lg font-semibold text-gray-700">Call Queues</h2>
                </div>
                <div id="call-queues-container" class="p-4 space-y-3 max-h-[70vh] overflow-y-auto">
                    <p class="text-gray-500 text-center py-4">Loading queue data...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- MOCK DATA (Updated) ---
        let mockSites = [ { id: 'site01', name: 'Headquarters' }, { id: 'site02', name: 'Branch Office Alpha' }, { id: 'site03', name: 'Support Center' }, ];
        let mockUsers = [
            { id: 'user001', name: 'Alice Smith', email: 'alice@example.com', extension: '101', directNumber: '+15551112201', profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=AS', siteId: 'site01', status: 'Available', statusMessage: 'Ready for calls!' },
            { id: 'user002', name: 'Bob Johnson', email: 'bob@example.com', extension: '102', directNumber: null, profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=BJ', siteId: 'site01', status: 'On Call', statusMessage: null },
            { id: 'user003', name: 'Charlie Brown', email: 'charlie@example.com', extension: '201', directNumber: '+15551112203', profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=CB', siteId: 'site02', status: 'Busy', statusMessage: 'Focusing' },
            { id: 'user004', name: 'Diana Prince', email: 'diana@example.com', extension: '103', directNumber: '+15551112204', profilePictureUrl: null, siteId: 'site01', status: 'In a Meeting', statusMessage: 'Internal Sync @ 2 PM' },
            { id: 'user005', name: 'Ethan Hunt', email: 'ethan@example.com', extension: '301', directNumber: null, profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=EH', siteId: 'site03', status: 'Away', statusMessage: null },
            { id: 'user006', name: 'Fiona Glenanne', email: 'fiona@example.com', extension: '202', directNumber: '+15551112206', profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=FG', siteId: 'site02', status: 'On Call', statusMessage: null },
            { id: 'user007', name: 'George Costanza', email: 'george@example.com', extension: '302', directNumber: null, profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=GC', siteId: 'site03', status: 'Offline', statusMessage: null },
            { id: 'user008', name: 'Hannah Abbott', email: 'hannah@example.com', extension: '104', directNumber: '+15551112208', profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=HA', siteId: 'site01', status: 'Available', statusMessage: null },
            { id: 'user009', name: 'Isaac Newton', email: 'isaac@example.com', extension: '105', directNumber: null, profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=IN', siteId: 'site01', status: 'DND', statusMessage: 'Project deadline' },
            { id: 'user010', name: 'Jane Doe', email: 'jane@example.com', extension: '203', directNumber: '+15551112210', profilePictureUrl: 'https://placehold.co/60x60/E2E8F0/A0AEC0?text=JD', siteId: 'site02', status: 'Out of Office', statusMessage: 'Vacation until 5/10' },
        ];
        let mockActiveCalls = [
            { callId: 'call_abc', participants: ['Bob Johnson', '+15551234567'], startTime: Date.now() - 120000, direction: 'Outbound' },
            { callId: 'call_def', participants: ['Fiona Glenanne', 'Sales Queue'], startTime: Date.now() - 30000, direction: 'Inbound' },
            { callId: 'call_ghi', participants: ['Alice Smith', '+15559876543'], startTime: Date.now() - 65000, direction: 'Inbound' }, // Unknown number
        ];
        let mockCallQueues = [ { id: 'q01', name: 'Sales Queue', callsWaiting: 2, longestWait: 185, agentsAvailable: 3, agentsBusy: 2 }, { id: 'q02', name: 'Support Queue', callsWaiting: 0, longestWait: 0, agentsAvailable: 5, agentsBusy: 1 }, { id: 'q03', name: 'Billing Queue', callsWaiting: 1, longestWait: 45, agentsAvailable: 1, agentsBusy: 1 }, ];
        let mockPhonebook = { '+15551234567': { name: 'ACME Corp Main', added: '2024-01-15' }, '+15551112201': { name: 'Alice Smith Direct', added: '2024-02-01' } /* Add more known numbers */ };
        let mockCallHistory = { '+15551234567': { lastContactDate: '2025-05-01T14:30:00Z', user: 'Alice Smith' }, '+15559876543': null /* No history for this number */ };

        // --- DOM Elements ---
        const sitesContainer = document.getElementById('sites-container');
        const activeCallsContainer = document.getElementById('active-calls-container');
        const callQueuesContainer = document.getElementById('call-queues-container');
        const lastUpdatedSpan = document.getElementById('last-updated');
        // Modal elements removed
        const statTotalUsers = document.getElementById('stat-total-users');
        const statAvailableUsers = document.getElementById('stat-available-users');
        const statOnCallUsers = document.getElementById('stat-on-call-users');
        const statActiveCalls = document.getElementById('stat-active-calls');
        const userSearchInput = document.getElementById('user-search');
        const usersLoading = document.getElementById('users-loading');
        const dashboardGrid = document.getElementById('dashboard-main-grid'); // Grid container
        let draggedSiteItem = null; // For sites
        let draggedPanelItem = null; // For panels
        let isFetching = false;
        let currentlyExpandedUserId = null; // Track expanded user

        // --- Helper Functions ---
        function getStatusInfo(status) {
            switch (status) {
                case 'Available': return { class: 'status-available', icon: 'fa-circle-check' };
                case 'On Call': return { class: 'status-on-call', icon: 'fa-phone-volume' };
                case 'Busy': return { class: 'status-busy', icon: 'fa-circle-minus' };
                case 'Away': return { class: 'status-away', icon: 'fa-person-walking-arrow-right' };
                case 'DND': return { class: 'status-dnd', icon: 'fa-bell-slash' }; // Do Not Disturb
                case 'In a Meeting': return { class: 'status-in-a-meeting', icon: 'fa-video' };
                case 'Out of Office': return { class: 'status-out-of-office', icon: 'fa-plane-departure' };
                case 'Offline': return { class: 'status-offline', icon: 'fa-circle-xmark' };
                default: return { class: 'status-offline', icon: 'fa-circle-question' };
            }
        }
        function formatDuration(startTime, showSeconds = true) { /* ... (same as before) ... */
             const now = Date.now(); const durationSeconds = Math.max(0, Math.floor((now - startTime) / 1000)); const minutes = Math.floor(durationSeconds / 60); const seconds = durationSeconds % 60;
             return showSeconds ? `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}` : `${minutes}m ${seconds}s`;
        }
        function formatQueueWaitTime(seconds) { /* ... (same as before) ... */
             if (seconds <= 0) return '0s'; const minutes = Math.floor(seconds / 60); const remainingSeconds = seconds % 60; return `${minutes}m ${remainingSeconds}s`;
        }
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
            } catch (e) {
                return 'Invalid Date';
            }
        }

        // --- Rendering Functions ---
        function renderUsers(filter = '') {
            const siteStates = {};
            sitesContainer.querySelectorAll('.site-section').forEach(section => {
                const siteId = section.dataset.siteId;
                const userList = section.querySelector('.user-list');
                if (siteId && userList) { siteStates[siteId] = userList.classList.contains('hidden'); }
            });

            // Preserve currently expanded user ID before clearing
            const previouslyExpanded = sitesContainer.querySelector('.user-detail-view');
            const previouslyExpandedUserId = previouslyExpanded ? previouslyExpanded.dataset.userId : null;

            sitesContainer.innerHTML = ''; // Clear previous content
            const filterLower = filter.toLowerCase();

            if (!mockUsers.length || !mockSites.length) { sitesContainer.innerHTML = '<p class="text-gray-500 p-4 text-center">No user or site data available.</p>'; return; }

            mockSites.forEach(site => {
                const usersInSite = mockUsers.filter(user => user.siteId === site.id && (filter === '' || user.name.toLowerCase().includes(filterLower) || (user.extension && user.extension.includes(filterLower))));

                if (usersInSite.length > 0 || filter === '') {
                    const siteSection = document.createElement('div');
                    siteSection.className = 'mb-1 rounded-md bg-white site-section';
                    siteSection.draggable = true; // Make site section draggable
                    siteSection.dataset.siteId = site.id;

                    const siteHeader = document.createElement('h3');
                    siteHeader.className = 'text-md font-semibold text-blue-700 site-header rounded-t-md';
                    const isCollapsed = siteStates[site.id] === true;
                    siteHeader.innerHTML = `<span>${site.name}</span> <span class="toggle-icon ${isCollapsed ? 'collapsed' : ''}"><i class="fas fa-chevron-down fa-xs"></i></span>`;
                    siteSection.appendChild(siteHeader);

                    const userList = document.createElement('ul');
                    userList.className = 'space-y-1 user-list';
                    if (isCollapsed) { userList.classList.add('hidden'); }

                    if (usersInSite.length === 0 && filter !== '') {
                        userList.innerHTML = '<li class="text-sm text-gray-500 italic p-2">No matching users in this site.</li>';
                    } else {
                        usersInSite.forEach(user => {
                            const userItem = document.createElement('li');
                            userItem.className = 'flex items-center justify-between text-sm p-2 rounded hover:bg-sky-50 user-item';
                            userItem.dataset.userId = user.id;
                            const statusInfo = getStatusInfo(user.status);
                            userItem.innerHTML = `
                                <div class="flex items-center overflow-hidden mr-2">
                                    <span class="${statusInfo.class} status-icon" title="${user.status}"><i class="fas ${statusInfo.icon}"></i></span>
                                    <span class="font-medium text-gray-800 truncate" title="${user.name}">${user.name}</span>
                                    <span class="ml-2 text-gray-500 text-xs flex-shrink-0">(Ext: ${user.extension || 'N/A'})</span>
                                </div>
                                <span class="text-gray-600 font-medium text-xs flex-shrink-0">${user.status}</span>
                            `;
                            userList.appendChild(userItem);
                            userItem.addEventListener('click', () => toggleUserDetails(user.id, userItem));

                            // Re-expand if this user was previously expanded
                            if (user.id === previouslyExpandedUserId) {
                                // Timeout ensures the element exists before trying to expand
                                setTimeout(() => {
                                    const currentItemElement = sitesContainer.querySelector(`li[data-user-id="${user.id}"]`);
                                    if (currentItemElement) {
                                        renderUserDetailView(user, currentItemElement);
                                    }
                                }, 0);
                            }
                        });
                    }
                    siteSection.appendChild(userList);
                    sitesContainer.appendChild(siteSection);
                    addSiteDragDropListeners(siteSection); // Use specific listeners for sites
                    addCollapseListeners(siteHeader, userList);
                }
            });
            if (sitesContainer.children.length === 0 && filter !== '') { sitesContainer.innerHTML = `<p class="text-gray-500 p-4 text-center">No users found matching "${filter}".</p>`; }
             else if (sitesContainer.children.length === 0 && filter === '') { sitesContainer.innerHTML = '<p class="text-gray-500 p-4 text-center">No users to display.</p>'; }
        }

        function toggleUserDetails(userId, clickedElement) {
            const existingDetailView = sitesContainer.querySelector('.user-detail-view');
            const currentlyExpandedId = existingDetailView ? existingDetailView.dataset.userId : null;

            // Remove existing view if there is one
            if (existingDetailView) {
                existingDetailView.remove();
            }

            // If clicking the same user again, just close it (already removed above)
            if (currentlyExpandedId === userId) {
                currentlyExpandedUserId = null;
                return;
            }

            // Otherwise, find user data and render the new detail view
            const user = mockUsers.find(u => u.id === userId);
            if (user) {
                renderUserDetailView(user, clickedElement);
                currentlyExpandedUserId = userId;
            }
        }

        function renderUserDetailView(user, targetElement) {
             const detailView = document.createElement('li'); // Use li to keep it within the ul
             detailView.className = 'user-detail-view';
             detailView.dataset.userId = user.id; // Mark which user it's for

             const site = mockSites.find(s => s.id === user.siteId);
             const statusInfo = getStatusInfo(user.status);
             const profilePicUrl = user.profilePictureUrl || `https://placehold.co/60x60/E2E8F0/A0AEC0?text=${user.name.substring(0, 2).toUpperCase()}`;

             detailView.innerHTML = `
                <div class="flex justify-end mb-2">
                     <button class="text-gray-400 hover:text-gray-600 text-xs close-detail-btn" aria-label="Close details">&times; Close</button>
                </div>
                <div class="detail-grid">
                    <img src="${profilePicUrl}" alt="Profile picture for ${user.name}" width="60" height="60" class="row-span-3">
                    <div class="col-span-1 font-semibold text-lg">${user.name}</div>

                    <div class="col-span-1 flex items-center">
                         <span class="${statusInfo.class} status-icon"><i class="fas ${statusInfo.icon}"></i></span>
                         <span class="detail-value">${user.status}</span>
                    </div>

                     <div class="col-span-1 text-xs">
                         ${user.statusMessage ? `<span class="status-message-bubble">${user.statusMessage}</span>` : ''}
                     </div>

                    <div class="detail-label">Extension:</div>
                    <div class="detail-value">${user.extension || 'N/A'}</div>

                    <div class="detail-label">Direct #:</div>
                    <div class="detail-value">${user.directNumber || 'N/A'}</div>

                    <div class="detail-label">Email:</div>
                    <div class="detail-value">${user.email || 'N/A'}</div>

                    <div class="detail-label">Site:</div>
                    <div class="detail-value">${site ? site.name : 'Unknown'}</div>
                </div>
                 <div class="flex justify-start space-x-2 mt-4 pt-3 border-t border-gray-200">
                     <button class="action-button call-button" ${user.status === 'Offline' ? 'disabled' : ''}><i class="fas fa-phone"></i> Call</button>
                     <button class="action-button chat-button" ${user.status === 'Offline' ? 'disabled' : ''}><i class="fas fa-comment"></i> Chat</button>
                     <button class="action-button text-button" ${!user.directNumber || user.status === 'Offline' ? 'disabled' : ''}><i class="fas fa-mobile-alt"></i> Text</button>
                 </div>
             `;

             // Insert the detail view right after the clicked user item
             targetElement.parentNode.insertBefore(detailView, targetElement.nextSibling);

             // Add listener to the close button within the detail view
             detailView.querySelector('.close-detail-btn').addEventListener('click', () => {
                 detailView.remove();
                 currentlyExpandedUserId = null;
             });
        }


        function renderActiveCalls() {
            activeCallsContainer.innerHTML = '';
            if (mockActiveCalls.length === 0) { activeCallsContainer.innerHTML = '<p class="text-gray-500 text-center py-4">No active calls.</p>'; return; }

            mockActiveCalls.forEach(call => {
                const callItem = document.createElement('div');
                callItem.className = 'border border-gray-200 p-3 rounded-lg bg-white text-sm shadow-sm';
                const directionIcon = call.direction === 'Inbound' ? 'fa-arrow-down' : 'fa-arrow-up';
                const directionColor = call.direction === 'Inbound' ? 'text-blue-600' : 'text-green-600';

                // Process participants for phonebook lookup
                const processedParticipants = call.participants.map(p => {
                    // Basic check if it looks like a number (could be more robust)
                    if (p.startsWith('+') && p.length > 8) {
                        const contact = mockPhonebook[p];
                        if (contact) {
                            return `<span title="${p}">${contact.name}</span>`; // Show name, number on hover
                        } else {
                            // Unknown number - show number and Add button
                            return `<span>${p}</span> <button class="action-button add-contact-button ml-1" data-number="${p}" title="Add to phonebook"><i class="fas fa-user-plus fa-xs"></i></button>`;
                        }
                    }
                    return p; // Assume internal user/queue name
                }).join(' <i class="fas fa-exchange-alt fa-xs text-gray-400 mx-1"></i> '); // Separator

                // Check call history for external numbers
                let historyHtml = '';
                const externalNumber = call.participants.find(p => p.startsWith('+') && p.length > 8);
                if (externalNumber) {
                    const history = mockCallHistory[externalNumber];
                    if (history) {
                        historyHtml = `<div class="text-xs text-gray-500 mt-1"><i class="fas fa-history mr-1"></i> Last: ${formatDate(history.lastContactDate)} by ${history.user}</div>`;
                    } else if (!mockPhonebook[externalNumber]) {
                        // Only show if not already in phonebook (avoid redundancy with Add button)
                         historyHtml = `<div class="text-xs text-gray-500 mt-1"><i class="fas fa-history mr-1"></i> No contact history</div>`;
                    }
                }


                callItem.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-semibold text-gray-800 truncate mr-2">${processedParticipants}</span>
                        <span class="text-xs px-2 py-0.5 rounded flex items-center flex-shrink-0 ${call.direction === 'Inbound' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
                           <i class="fas ${directionIcon} ${directionColor} mr-1 fa-xs"></i> ${call.direction}
                        </span>
                    </div>
                    <div class="text-gray-600">
                        <i class="far fa-clock mr-1 text-gray-400"></i> Duration: <span class="font-medium text-red-600">${formatDuration(call.startTime)}</span>
                    </div>
                    ${historyHtml}
                    <div class="text-xs text-gray-400 mt-1 truncate" title="Call ID: ${call.callId}">Call ID: ${call.callId}</div>
                `;
                activeCallsContainer.appendChild(callItem);

                 // Add listener for the "Add Contact" button if it exists
                 const addBtn = callItem.querySelector('.add-contact-button');
                 if (addBtn) {
                     addBtn.addEventListener('click', (e) => {
                         e.stopPropagation(); // Prevent triggering other clicks if nested
                         const numberToAdd = e.currentTarget.dataset.number;
                         alert(`Simulating: Add number ${numberToAdd} to phonebook.`);
                         // In a real app: Open a form/modal to add contact details
                         // Then update mockPhonebook and re-render
                         mockPhonebook[numberToAdd] = { name: `New Contact (${numberToAdd.slice(-4)})`, added: new Date().toISOString() };
                         renderActiveCalls(); // Re-render to show the name now
                     });
                 }
            });
        }

        function renderCallQueues() { /* ... (same as before) ... */
             callQueuesContainer.innerHTML = ''; if (mockCallQueues.length === 0) { callQueuesContainer.innerHTML = '<p class="text-gray-500 text-center py-4">No call queues defined.</p>'; return; }
             mockCallQueues.forEach(queue => { const queueItem = document.createElement('div'); queueItem.className = 'border border-gray-200 p-3 rounded-lg bg-white text-sm shadow-sm space-y-1'; const waitTimeColor = queue.callsWaiting > 0 ? (queue.longestWait > 180 ? 'text-red-600' : 'text-orange-500') : 'text-gray-500'; queueItem.innerHTML = ` <div class="font-semibold text-gray-800">${queue.name}</div> <div class="flex justify-between text-xs"> <span class="text-gray-600"><i class="fas fa-phone-alt mr-1 text-blue-500"></i> Calls Waiting:</span> <span class="font-medium ${queue.callsWaiting > 0 ? 'text-blue-600' : 'text-gray-500'}">${queue.callsWaiting}</span> </div> <div class="flex justify-between text-xs"> <span class="text-gray-600"><i class="fas fa-hourglass-half mr-1 ${waitTimeColor}"></i> Longest Wait:</span> <span class="font-medium ${waitTimeColor}">${formatQueueWaitTime(queue.longestWait)}</span> </div> <div class="flex justify-between text-xs"> <span class="text-gray-600"><i class="fas fa-user-check mr-1 text-green-500"></i> Agents Available:</span> <span class="font-medium text-green-600">${queue.agentsAvailable}</span> </div> <div class="flex justify-between text-xs"> <span class="text-gray-600"><i class="fas fa-user-clock mr-1 text-red-500"></i> Agents Busy:</span> <span class="font-medium text-red-600">${queue.agentsBusy}</span> </div> `; callQueuesContainer.appendChild(queueItem); });
        }
        function updateSummaryStats() { /* ... (same as before) ... */
             statTotalUsers.textContent = mockUsers.length; statAvailableUsers.textContent = mockUsers.filter(u => u.status === 'Available').length; statOnCallUsers.textContent = mockUsers.filter(u => u.status === 'On Call').length; statActiveCalls.textContent = mockActiveCalls.length;
        }
        function updateLastUpdatedTime() { /* ... (same as before) ... */
             const now = new Date(); lastUpdatedSpan.textContent = now.toLocaleTimeString();
        }

        // --- Event Listener Setup ---
        function addCollapseListeners(headerElement, listElement) { /* ... (same as before) ... */
             headerElement.addEventListener('click', (e) => { if (e.target === headerElement || headerElement.contains(e.target)) { const isHidden = listElement.classList.toggle('hidden'); const iconContainer = headerElement.querySelector('.toggle-icon'); if (iconContainer) { iconContainer.classList.toggle('collapsed', isHidden); } } });
        }
        // Specific drag listeners for Site sections
        function addSiteDragDropListeners(element) {
            element.addEventListener('dragstart', handleSiteDragStart);
            element.addEventListener('dragover', handleSiteDragOver);
            element.addEventListener('dragleave', handleSiteDragLeave);
            element.addEventListener('drop', handleSiteDrop);
            element.addEventListener('dragend', handleSiteDragEnd);
        }
         // Specific drag listeners for Dashboard Panels
         function addPanelDragDropListeners(element) {
            element.addEventListener('dragstart', handlePanelDragStart);
            element.addEventListener('dragover', handlePanelDragOver);
            element.addEventListener('dragleave', handlePanelDragLeave);
            element.addEventListener('drop', handlePanelDrop);
            element.addEventListener('dragend', handlePanelDragEnd);
        }

        // Add listeners to initial panels
        dashboardGrid.querySelectorAll('.dashboard-panel').forEach(addPanelDragDropListeners);

        // Search listener
        userSearchInput.addEventListener('input', (e) => { renderUsers(e.target.value); });

        // --- Site Drag and Drop Handlers ---
        function handleSiteDragStart(e) { if (e.target.classList.contains('toggle-icon') || e.target.closest('.toggle-icon') || e.target.closest('.user-detail-view')) { e.preventDefault(); return; } draggedSiteItem = this; this.classList.add('dragging'); }
        function handleSiteDragOver(e) { e.preventDefault(); this.classList.add('site-drag-over'); }
        function handleSiteDragLeave(e) { this.classList.remove('site-drag-over'); }
        function handleSiteDrop(e) { e.preventDefault(); this.classList.remove('site-drag-over'); if (draggedSiteItem && draggedSiteItem !== this) { const container = this.parentNode; const targetRect = this.getBoundingClientRect(); const mouseOffsetY = e.clientY - targetRect.top; if (mouseOffsetY < targetRect.height / 2) { container.insertBefore(draggedSiteItem, this); } else { container.insertBefore(draggedSiteItem, this.nextSibling); } updateMockSitesOrder(); } }
        function handleSiteDragEnd(e) { if (draggedSiteItem) { draggedSiteItem.classList.remove('dragging'); } draggedSiteItem = null; sitesContainer.querySelectorAll('.site-section').forEach(el => el.classList.remove('site-drag-over')); }
        function updateMockSitesOrder() { const orderedSiteIds = Array.from(sitesContainer.querySelectorAll('.site-section')).map(el => el.dataset.siteId); mockSites.sort((a, b) => orderedSiteIds.indexOf(a.id) - orderedSiteIds.indexOf(b.id)); }

        // --- Panel Drag and Drop Handlers ---
        function handlePanelDragStart(e) {
             // Only allow dragging from the header area if defined, otherwise whole panel
             const handle = this.querySelector('.cursor-grab');
             if (handle && !handle.contains(e.target) && handle !== e.target) {
                 e.preventDefault();
                 return;
             }
            draggedPanelItem = this;
            // Use setTimeout to allow the browser to render the drag image before applying style
            setTimeout(() => this.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        }
        function handlePanelDragOver(e) {
            e.preventDefault();
            this.classList.add('panel-drag-over');
            e.dataTransfer.dropEffect = 'move';
        }
        function handlePanelDragLeave(e) { this.classList.remove('panel-drag-over'); }
        function handlePanelDrop(e) {
            e.preventDefault();
            this.classList.remove('panel-drag-over');
            if (draggedPanelItem && draggedPanelItem !== this) {
                const container = dashboardGrid;
                // Simple swap logic for grid items
                const targetIndex = Array.from(container.children).indexOf(this);
                const draggedIndex = Array.from(container.children).indexOf(draggedPanelItem);

                if (draggedIndex < targetIndex) {
                    container.insertBefore(draggedPanelItem, this.nextSibling);
                } else {
                    container.insertBefore(draggedPanelItem, this);
                }
            }
        }
        function handlePanelDragEnd(e) {
            if (draggedPanelItem) { draggedPanelItem.classList.remove('dragging'); }
            draggedPanelItem = null;
            dashboardGrid.querySelectorAll('.dashboard-panel').forEach(el => el.classList.remove('panel-drag-over'));
        }


        // --- Initialization and Simulation ---
        async function fetchData() { /* ... (same as before, includes loading indicator toggle) ... */
            if (isFetching) return; isFetching = true; usersLoading.classList.remove('hidden'); console.log("Simulating data fetch..."); await new Promise(resolve => setTimeout(resolve, 400)); simulateUpdates(); renderUsers(userSearchInput.value); renderActiveCalls(); renderCallQueues(); updateSummaryStats(); updateLastUpdatedTime(); usersLoading.classList.add('hidden'); isFetching = false;
        }
        function simulateUpdates() { /* ... (same as before, now includes status messages maybe) ... */
             // Status change
             if (mockUsers.length > 0 && Math.random() < 0.15) { const userIndex = Math.floor(Math.random() * mockUsers.length); const statuses = ['Available', 'On Call', 'Busy', 'Away', 'DND', 'In a Meeting', 'Out of Office', 'Offline']; const currentStatus = mockUsers[userIndex].status; let newStatus; do { newStatus = statuses[Math.floor(Math.random() * statuses.length)]; } while (newStatus === currentStatus); mockUsers[userIndex].status = newStatus; mockUsers[userIndex].statusMessage = (newStatus === 'Busy' && Math.random() < 0.3) ? 'Deep work' : (newStatus === 'Out of Office' ? 'On PTO' : null); if(newStatus === 'On Call' && !mockActiveCalls.some(call => call.participants.includes(mockUsers[userIndex].name))) { mockActiveCalls.push({ callId: `call_${Math.random().toString(36).substring(7)}`, participants: [mockUsers[userIndex].name, `+1555${Math.floor(1000000 + Math.random() * 9000000)}`], startTime: Date.now(), direction: Math.random() < 0.5 ? 'Inbound' : 'Outbound' }); } else if (currentStatus === 'On Call' && newStatus !== 'On Call') { const callIndex = mockActiveCalls.findIndex(call => call.participants.includes(mockUsers[userIndex].name)); if (callIndex !== -1) { mockActiveCalls.splice(callIndex, 1); } } }
             // Call end
             if (mockActiveCalls.length > 0 && Math.random() < 0.1) { const callIndex = Math.floor(Math.random() * mockActiveCalls.length); const endingCall = mockActiveCalls.splice(callIndex, 1)[0]; const externalNumber = endingCall.participants.find(p => p.startsWith('+')); const internalUser = endingCall.participants.find(p => !p.startsWith('+')); if (externalNumber && internalUser) { mockCallHistory[externalNumber] = { lastContactDate: new Date().toISOString(), user: internalUser }; } endingCall.participants.forEach(pName => { const userIndex = mockUsers.findIndex(u => u.name === pName && u.status === 'On Call'); if (userIndex !== -1) { mockUsers[userIndex].status = 'Available'; } }); }
             // Queue change
             mockCallQueues.forEach(q => { if (Math.random() < 0.2) q.callsWaiting = Math.max(0, q.callsWaiting + (Math.random() < 0.5 ? 1 : -1)); if (q.callsWaiting > 0 && Math.random() < 0.3) q.longestWait += Math.floor(Math.random() * 10); else if (q.callsWaiting === 0) q.longestWait = 0; if (Math.random() < 0.1) q.agentsAvailable = Math.max(0, q.agentsAvailable + (Math.random() < 0.5 ? 1 : -1)); if (Math.random() < 0.1) q.agentsBusy = Math.max(0, q.agentsBusy + (Math.random() < 0.5 ? 1 : -1)); });
        }

        // Initial render
        fetchData();

        // Simulate fetching data every 5 seconds & update durations
        setInterval(fetchData, 5000);
        // Update call durations more frequently
        setInterval(() => {
             if (mockActiveCalls.length > 0) { renderActiveCalls(); }
             if (mockCallQueues.some(q => q.callsWaiting > 0)) { renderCallQueues(); }
        }, 1000);

    </script>
